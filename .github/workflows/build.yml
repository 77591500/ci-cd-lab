name: CI-CD-LAB

on:
  push:
    branches:
      - master

jobs:

  build-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Image
        run: docker build -t ci-cd-lab:v1 .

      - name: Run Container
        run: |
          docker run -d --name webtest -p 8081:80 ci-cd-lab:v1

      - name: Validate Site
        run: |
          sleep 5
          curl http://localhost:8081
